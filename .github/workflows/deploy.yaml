name: Deploy to WSL

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t hello-ci-cd .

    - name: Stop old container
      run: docker stop hello || true

    - name: Remove old container
      run: docker rm hello || true

    - name: Run new container
      run: docker run -d --name hello hello-ci-cd